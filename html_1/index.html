<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOTT – Night On The Town</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #F8F3EE;
      --warm-white:  #FDFAF7;
      --brown-dark:  #3D2B1F;
      --brown-mid:   #7B5240;
      --brown-btn:   #8B4513;
      --brown-light: #C9A882;
      --gold:        #C8973A;
      --border:      #E2D5C8;
      --muted:       #8A7060;
      --font-h:      'Playfair Display', Georgia, serif;
      --font-b:      'DM Sans', sans-serif;
      --shadow:      0 4px 24px rgba(61,43,31,0.12);
    }

    body {
      font-family: var(--font-b);
      background: var(--warm-white);
      color: var(--brown-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===================== HEADER ===================== */
    .site-header {
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      flex-shrink: 0;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 26px; }
    .logo-text {
      font-family: var(--font-h);
      font-size: 18px; font-weight: 700;
      color: var(--brown-dark);
    }

    .header-tag {
      background: var(--gold); color: white;
      font-size: 11px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      padding: 5px 14px; border-radius: 20px;
    }

    /* ===================== HERO BANNER ===================== */
    .hero-banner {
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      padding: 36px 40px;
      display: flex;
      align-items: center;
      gap: 48px;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    .hero-banner img {
      width: 120px; height: 150px;
      object-fit: cover; border-radius: 12px;
      box-shadow: var(--shadow); flex-shrink: 0;
    }

    .hero-text h1 {
      font-family: var(--font-h);
      font-size: 36px; line-height: 1.2;
      color: var(--brown-dark); margin-bottom: 10px;
    }
    .hero-text h1 em { font-style: italic; color: var(--brown-btn); }
    .hero-text p {
      font-size: 15px; color: var(--muted);
      line-height: 1.6; max-width: 500px;
    }

    /* ===================== COLOR SECTION ===================== */
    .colors-wrap {
      flex: 1;
      max-width: 960px; margin: 0 auto;
      width: 100%; padding: 32px 40px 160px;
    }

    .section-label {
      font-size: 12px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }

    /* Filter tabs */
    .filter-bar {
      display: flex;
      border-bottom: 2px solid var(--border);
      overflow-x: auto; margin-bottom: 28px;
    }
    .filter-tab {
      background: none; border: none;
      padding: 10px 18px;
      font-family: var(--font-b); font-size: 13px; font-weight: 700;
      color: var(--muted); cursor: pointer; white-space: nowrap;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: all .2s;
    }
    .filter-tab:hover { color: var(--brown-dark); }
    .filter-tab.active { color: var(--brown-dark); border-bottom-color: var(--brown-btn); }

    /* Color grid */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
      gap: 14px;
    }

    .swatch {
      width: 54px; height: 54px; border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform .15s, box-shadow .15s, border-color .15s;
      position: relative;
    }
    .swatch:hover { transform: scale(1.16); box-shadow: 0 4px 14px rgba(0,0,0,.25); }
    .swatch.selected {
      border-color: var(--brown-dark);
      box-shadow: 0 0 0 4px var(--brown-light);
      transform: scale(1.12);
    }
    .swatch.selected::after {
      content: '✓';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }

    /* ===================== BOTTOM BAR ===================== */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid var(--border);
      padding: 14px 40px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 -4px 20px rgba(61,43,31,.1);
      z-index: 100; gap: 16px;
    }

    .bar-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }

    #chip-row { display: flex; gap: 6px; flex-shrink: 0; }
    .chip {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 0 1px var(--border);
      cursor: pointer; flex-shrink: 0;
      transition: transform .15s;
    }
    .chip:hover { transform: scale(1.25); }

    #count-label {
      font-size: 13px; font-weight: 700;
      color: var(--muted); white-space: nowrap;
    }

    .btn-outfits {
      background: var(--brown-btn); color: white;
      font-family: var(--font-b); font-size: 14px; font-weight: 700;
      padding: 13px 30px; border: none; border-radius: 10px;
      cursor: pointer; opacity: .4;
      transition: all .2s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-outfits.ready { opacity: 1; }
    .btn-outfits.ready:hover { background: var(--brown-dark); transform: translateY(-1px); }

    /* ===================== TOAST ===================== */
    .toast {
      position: fixed; top: 80px; right: 24px;
      background: var(--brown-dark); color: white;
      padding: 13px 22px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow); z-index: 999;
      transform: translateX(130%); transition: transform .3s ease;
      max-width: 280px;
    }
    .toast.show { transform: translateX(0); }

    /* ===================== FOOTER ===================== */
    .site-footer {
      background: var(--cream); border-top: 1px solid var(--border);
      padding: 20px 40px; text-align: center;
      font-size: 12px; color: var(--muted);
      flex-shrink: 0;
    }

    /* ===================== RESPONSIVE ===================== */
    @media (max-width: 640px) {
      .site-header { padding: 0 20px; }
      .hero-banner { padding: 24px 20px; gap: 20px; }
      .hero-banner img { width: 80px; height: 100px; }
      .hero-text h1 { font-size: 24px; }
      .colors-wrap { padding: 24px 20px 160px; }
      .bottom-bar { flex-direction: column; padding: 14px 20px; gap: 10px; }
      .bar-left { width: 100%; justify-content: center; }
      .btn-outfits { width: 100%; text-align: center; }
      .header-tag { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-icon">🪡</span>
      <span class="logo-text">Night On The Town</span>
    </div>
    <span class="header-tag">✨ All sizes &amp; ages welcome</span>
  </header>

  <!-- HERO BANNER -->
  <div class="hero-banner">
    <img src="diverse-fashion-revolution.jpeg" alt="Diverse colorful fashion">
    <div class="hero-text">
      <h1>Find outfits you'll <em>love</em> — start with color</h1>
      <p>Tap the colors that speak to you and we'll build outfit ideas tailored to your style. No sign-up needed — just start picking!</p>
    </div>
  </div>

  <!-- COLOR PICKER -->
  <div class="colors-wrap">
    <p class="section-label">Select your colors</p>

    <div class="filter-bar">
      <button class="filter-tab active" onclick="filterColors(this, 'all')">All Colors</button>
      <button class="filter-tab" onclick="filterColors(this, 'neutral')">Neutrals</button>
      <button class="filter-tab" onclick="filterColors(this, 'red')">Reds &amp; Pinks</button>
      <button class="filter-tab" onclick="filterColors(this, 'orange')">Oranges &amp; Yellows</button>
      <button class="filter-tab" onclick="filterColors(this, 'green')">Greens</button>
      <button class="filter-tab" onclick="filterColors(this, 'blue')">Blues</button>
      <button class="filter-tab" onclick="filterColors(this, 'purple')">Purples</button>
    </div>

    <div class="color-grid" id="color-grid"></div>
  </div>

  <!-- FIXED BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="bar-left">
      <div id="chip-row"></div>
      <span id="count-label">Pick a color to get started</span>
    </div>
    <button class="btn-outfits" id="outfit-btn" onclick="seeOutfits()">See Outfit Ideas →</button>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // COLOR DATA — 58 colors across 6 categories
    // ============================================================
    var COLORS = [
      // Neutrals
      { hex: '#FAF7F0', name: 'Snow',        cat: 'neutral' },
      { hex: '#F0E8DA', name: 'Linen',       cat: 'neutral' },
      { hex: '#E0CDB4', name: 'Sand',        cat: 'neutral' },
      { hex: '#C8AD90', name: 'Wheat',       cat: 'neutral' },
      { hex: '#A88A6A', name: 'Tan',         cat: 'neutral' },
      { hex: '#8A6A4A', name: 'Caramel',     cat: 'neutral' },
      { hex: '#6A4A2E', name: 'Coffee',      cat: 'neutral' },
      { hex: '#4A2E1A', name: 'Espresso',    cat: 'neutral' },
      { hex: '#1A1008', name: 'Midnight',    cat: 'neutral' },
      { hex: '#888888', name: 'Gray',        cat: 'neutral' },
      { hex: '#B8B8B8', name: 'Silver',      cat: 'neutral' },
      { hex: '#E8E8E8', name: 'Mist',        cat: 'neutral' },
      // Reds & Pinks
      { hex: '#8B0000', name: 'Crimson',     cat: 'red' },
      { hex: '#B81C1C', name: 'Cherry',      cat: 'red' },
      { hex: '#D93030', name: 'Flame',       cat: 'red' },
      { hex: '#E05555', name: 'Tomato',      cat: 'red' },
      { hex: '#E87070', name: 'Coral Red',   cat: 'red' },
      { hex: '#E8607A', name: 'Punch',       cat: 'red' },
      { hex: '#E8839D', name: 'Blush',       cat: 'red' },
      { hex: '#F4A8BC', name: 'Rose',        cat: 'red' },
      { hex: '#FAC8D5', name: 'Petal',       cat: 'red' },
      { hex: '#FFE0E8', name: 'Blush White', cat: 'red' },
      // Oranges & Yellows
      { hex: '#B84000', name: 'Burnt',       cat: 'orange' },
      { hex: '#D05820', name: 'Rust',        cat: 'orange' },
      { hex: '#E07030', name: 'Pumpkin',     cat: 'orange' },
      { hex: '#E88D40', name: 'Tangerine',   cat: 'orange' },
      { hex: '#F0A840', name: 'Amber',       cat: 'orange' },
      { hex: '#F5C040', name: 'Honey',       cat: 'orange' },
      { hex: '#F5D830', name: 'Marigold',    cat: 'orange' },
      { hex: '#F8E830', name: 'Lemon',       cat: 'orange' },
      { hex: '#FCF480', name: 'Butter',      cat: 'orange' },
      // Greens
      { hex: '#0D3820', name: 'Forest',      cat: 'green' },
      { hex: '#1A5E32', name: 'Hunter',      cat: 'green' },
      { hex: '#2A8048', name: 'Emerald',     cat: 'green' },
      { hex: '#3A9E58', name: 'Jade',        cat: 'green' },
      { hex: '#50B870', name: 'Mint',        cat: 'green' },
      { hex: '#78CC90', name: 'Spring',      cat: 'green' },
      { hex: '#A8DDB5', name: 'Celadon',     cat: 'green' },
      { hex: '#2A7060', name: 'Teal',        cat: 'green' },
      { hex: '#1A504A', name: 'Pine',        cat: 'green' },
      // Blues
      { hex: '#08205A', name: 'Navy',        cat: 'blue' },
      { hex: '#143880', name: 'Royal',       cat: 'blue' },
      { hex: '#1E56B0', name: 'Cobalt',      cat: 'blue' },
      { hex: '#2E74D0', name: 'Azure',       cat: 'blue' },
      { hex: '#4A90E2', name: 'Sky',         cat: 'blue' },
      { hex: '#74B0F0', name: 'Cornflower',  cat: 'blue' },
      { hex: '#A4CEFC', name: 'Powder',      cat: 'blue' },
      { hex: '#CCE8FF', name: 'Ice',         cat: 'blue' },
      { hex: '#1890A8', name: 'Peacock',     cat: 'blue' },
      // Purples
      { hex: '#300870', name: 'Indigo',      cat: 'purple' },
      { hex: '#4A1888', name: 'Violet',      cat: 'purple' },
      { hex: '#6030A8', name: 'Plum',        cat: 'purple' },
      { hex: '#7A48C0', name: 'Amethyst',    cat: 'purple' },
      { hex: '#9468D8', name: 'Lavender',    cat: 'purple' },
      { hex: '#B090E8', name: 'Wisteria',    cat: 'purple' },
      { hex: '#CEB8F5', name: 'Lilac',       cat: 'purple' },
      { hex: '#E4D8FF', name: 'Pale Violet', cat: 'purple' },
      { hex: '#8B1A8B', name: 'Magenta',     cat: 'purple' },
    ];

    // ============================================================
    // STATE
    // ============================================================
    var selectedHexes = [];      // array of selected hex strings
    var currentFilter = 'all';   // active category filter

    // Math variables
    var totalColors      = COLORS.length;
    var totalCategories  = 6;
    var avgPerCategory   = Math.floor(totalColors / totalCategories);

    console.log('NOTT loaded. Colors: ' + totalColors + ', avg per category: ' + avgPerCategory);

    // ============================================================
    // buildGrid(filter)
    // Renders swatches for the given category filter.
    // ============================================================
    function buildGrid(filter) {
      var grid = document.getElementById('color-grid');
      grid.innerHTML = '';

      // Filter array to matching colors only
      var visible = COLORS.filter(function(c) {
        return filter === 'all' || c.cat === filter;
      });

      // Loop: create one swatch per color
      visible.forEach(function(colorObj) {
        var swatch = document.createElement('div');
        swatch.className = 'swatch';
        swatch.style.backgroundColor = colorObj.hex;
        swatch.title = colorObj.name;

        // Restore selected state if already chosen
        if (selectedHexes.indexOf(colorObj.hex) !== -1) {
          swatch.classList.add('selected');
        }

        swatch.addEventListener('click', function() {
          toggleColor(colorObj.hex, swatch);
        });

        grid.appendChild(swatch);
      });

      console.log('Grid: filter=' + filter + ', showing ' + visible.length + ' colors');
    }

    // ============================================================
    // toggleColor(hex, el)
    // Selects or deselects a color and updates the bottom bar.
    // ============================================================
    function toggleColor(hex, el) {
      var index = selectedHexes.indexOf(hex);
      var alreadySelected = index !== -1;   // boolean

      if (alreadySelected) {
        selectedHexes.splice(index, 1);
        el.classList.remove('selected');
      } else {
        selectedHexes.push(hex);
        el.classList.add('selected');
      }

      updateBottomBar();
      console.log('Selection count: ' + selectedHexes.length);
    }

    // ============================================================
    // filterColors(btn, category)
    // Switches the active filter tab and rebuilds the grid.
    // ============================================================
    function filterColors(btn, category) {
      document.querySelectorAll('.filter-tab').forEach(function(t) {
        t.classList.remove('active');
      });
      btn.classList.add('active');
      currentFilter = category;
      buildGrid(category);
    }

    // ============================================================
    // updateBottomBar()
    // Syncs chips, count label, and button readiness.
    // ============================================================
    function updateBottomBar() {
      var chipRow   = document.getElementById('chip-row');
      var countEl   = document.getElementById('count-label');
      var outfitBtn = document.getElementById('outfit-btn');

      // Rebuild chips (show up to 8)
      chipRow.innerHTML = '';
      var maxChips = 8;
      var shown    = selectedHexes.slice(0, maxChips);

      shown.forEach(function(hex) {
        var chip = document.createElement('div');
        chip.className = 'chip';
        chip.style.backgroundColor = hex;
        chip.title = 'Remove this color';
        chip.addEventListener('click', function() { removeColor(hex); });
        chipRow.appendChild(chip);
      });

      // Count label — if/else with math
      var total    = selectedHexes.length;
      var overflow = total - shown.length;   // math: subtraction

      if (total === 0) {
        countEl.textContent = 'Pick a color to get started';
      } else if (total === 1) {
        countEl.textContent = '1 color selected';
      } else if (overflow > 0) {
        countEl.textContent = total + ' selected (+' + overflow + ' more)';
      } else {
        countEl.textContent = total + ' colors selected';
      }

      // Enable button if at least 1 color chosen
      if (total >= 1) {
        outfitBtn.classList.add('ready');
      } else {
        outfitBtn.classList.remove('ready');
      }
    }

    // ============================================================
    // removeColor(hex)
    // Deselects a color via its chip in the bottom bar.
    // ============================================================
    function removeColor(hex) {
      var index = selectedHexes.indexOf(hex);
      if (index !== -1) { selectedHexes.splice(index, 1); }

      // Deselect matching swatch in the grid
      document.querySelectorAll('.swatch').forEach(function(s) {
        var r = parseInt(hex.slice(1,3), 16);
        var g = parseInt(hex.slice(3,5), 16);
        var b = parseInt(hex.slice(5,7), 16);
        if (s.style.backgroundColor === 'rgb(' + r + ', ' + g + ', ' + b + ')') {
          s.classList.remove('selected');
        }
      });

      updateBottomBar();
    }

    // ============================================================
    // seeOutfits()
    // Called when the outfit button is clicked.
    // ============================================================
    function seeOutfits() {
      var total = selectedHexes.length;

      if (total === 0) {
        showToast('👆 Pick at least one color first!');
      } else {
        // Math: outfit combos based on selection count
        var combos = total * 3;
        showToast('🎉 ' + total + ' color(s) chosen! Generating ' + combos + ' outfit ideas…');
        console.log('Outfit generation: ' + total + ' colors, ' + combos + ' combos');
      }
    }

    // ============================================================
    // showToast(msg) — floating notification for 3 seconds
    // ============================================================
    function showToast(msg) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }

    // ============================================================
    // INIT — build the grid immediately on page load
    // ============================================================
    buildGrid('all');
    console.log('NOTT ready — no login required!');
  </script>

</body>
</html>
